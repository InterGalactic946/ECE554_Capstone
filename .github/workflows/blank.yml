# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
    paths-ignore:
      - "ci_logs/**"
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: self-hosted

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run CI
        run: make ci

      - name: Commit and push logs
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci-bot@users.noreply.github.com"

          # Save logs temporarily
          mkdir -p /tmp/ci_logs_backup
          cp -r ci_logs/* /tmp/ci_logs_backup/ || true

          # Switch to new orphan branch (no history)
          git checkout --orphan CI_Logs

          # Remove everything
          git rm -rf . || true

          # Restore logs
          mkdir ci_logs
          cp -r /tmp/ci_logs_backup/* ci_logs/ || true

          git add ci_logs/
          git commit -m "Update CI logs"

          # Force push (overwrite branch each run)
          git push origin CI_Logs --force
